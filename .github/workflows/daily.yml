name: Daily Digest

on:
  schedule:
    - cron: '0 9 * * 1-5'   # 9am UTC, weekdays
  workflow_dispatch:          # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install httpx feedparser python-dotenv

      - name: Generate digest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m signalfeed.generate
        working-directory: src

      - name: Commit and push
        run: |
          git config user.name "signal-bot"
          git config user.email "signal-bot@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "digest: $(date -u '+%Y-%m-%d')"
          git push

      - name: Send email digest
        env:
          RESEND_API_KEY:     ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
        run: python -m signalfeed.email_send
        working-directory: src
